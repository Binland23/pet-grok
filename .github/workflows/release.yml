name: Release desktop installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            command: npm run dist:mac
            files: |
              dist/*.dmg
              dist/*.zip
          - platform: Windows
            os: windows-latest
            command: npm run dist:win
            files: dist/*.exe
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build installers
        run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.platform }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: installers-*
          path: release-assets
          merge-multiple: true
      - name: Create release or replace installer assets
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber --repo "$REPOSITORY"
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --generate-notes \
              --title "Pet Grok ${RELEASE_TAG#v}" \
              --verify-tag \
              --repo "$REPOSITORY"
          fi
