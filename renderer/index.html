<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: file: blob:;" />
  <title>Pet Grok</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    body { display: flex; align-items: flex-start; justify-content: center; }
    #stage {
      position: relative;
      width: 100%;
      /* Pet sprite is square; extra height below is for the status bubble */
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: transparent;
    }
    #petArea {
      position: relative;
      width: 100%;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 1;
      flex: 0 0 auto;
    }
    #petCanvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: auto;
    }
    /* Hover chevron — quick show/hide for the status bubble (Codex-pets style) */
    #statusToggle {
      position: absolute;
      left: 50%;
      bottom: 4px;
      z-index: 5;
      width: 22px;
      height: 18px;
      margin: 0;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.32) 0%, rgba(255, 255, 255, 0.08) 45%, rgba(18, 28, 48, 0.35) 100%),
        rgba(16, 24, 40, 0.42);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        0 4px 12px rgba(0, 0, 0, 0.28);
      -webkit-backdrop-filter: blur(12px) saturate(1.4);
      backdrop-filter: blur(12px) saturate(1.4);
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(6px) scale(0.92);
      transition:
        opacity 0.18s ease,
        transform 0.2s cubic-bezier(0.22, 1, 0.36, 1),
        background 0.15s ease,
        border-color 0.15s ease,
        box-shadow 0.15s ease;
    }
    #statusToggle.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0) scale(1);
    }
    #statusToggle:hover {
      border-color: rgba(255, 255, 255, 0.65);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.6),
        0 6px 14px rgba(0, 0, 0, 0.32),
        0 0 0 3px rgba(255, 255, 255, 0.08);
    }
    #statusToggle:active {
      transform: translateX(-50%) translateY(1px) scale(0.96);
    }
    #statusToggle:focus-visible {
      outline: 2px solid rgba(255, 210, 80, 0.85);
      outline-offset: 2px;
    }
    #statusToggle .chev {
      display: block;
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      /* Point down when status is hidden (click to show) */
      border-top: 5px solid rgba(255, 255, 255, 0.95);
      border-bottom: 0;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.35));
      transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    }
    /* Point up when status is shown (click to hide) */
    #statusToggle.status-on .chev {
      border-top: 0;
      border-bottom: 5px solid rgba(255, 255, 255, 0.95);
    }
    /* Liquid-glass status bubble under the pet */
    #status {
      position: relative;
      flex: 0 0 auto;
      margin-top: 2px;
      max-width: 94%;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: #fff;
      text-align: center;
      pointer-events: none;
      padding: 6px 12px 7px;
      border-radius: 18px;
      background:
        linear-gradient(155deg, rgba(255, 255, 255, 0.28) 0%, rgba(255, 255, 255, 0.06) 42%, rgba(20, 30, 50, 0.22) 100%),
        rgba(18, 28, 48, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.38);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        inset 0 -1px 0 rgba(0, 0, 0, 0.12),
        0 8px 22px rgba(0, 0, 0, 0.22),
        0 0 0 1px rgba(255, 255, 255, 0.06);
      -webkit-backdrop-filter: blur(16px) saturate(1.45);
      backdrop-filter: blur(16px) saturate(1.45);
      opacity: 0.98;
      transform: translateY(0) scale(1);
      transition:
        background 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.22s ease,
        transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #status.hidden {
      opacity: 0;
      transform: translateY(6px) scale(0.96);
      pointer-events: none;
      visibility: hidden;
    }
    #statusLabel {
      font-size: 10px;
      font-weight: 750;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.2;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
    }
    #statusDetail {
      display: none;
      margin-top: 3px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.01em;
      line-height: 1.3;
      opacity: 0.92;
      max-width: 100%;
      overflow: hidden;
      text-align: center;
      /* Up to two lines so short sentences are readable */
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      word-break: break-word;
    }
    #statusDetail.has-detail {
      display: -webkit-box;
    }
    #status.st-thinking {
      border-color: rgba(126, 182, 255, 0.65);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.45),
        0 8px 22px rgba(0, 0, 0, 0.2),
        0 0 18px rgba(80, 140, 255, 0.22);
    }
    #status.st-working {
      border-color: rgba(255, 193, 74, 0.7);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.45),
        0 8px 22px rgba(0, 0, 0, 0.2),
        0 0 18px rgba(255, 170, 40, 0.2);
    }
    #status.st-done {
      border-color: rgba(125, 255, 176, 0.65);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.45),
        0 8px 22px rgba(0, 0, 0, 0.2),
        0 0 18px rgba(60, 220, 120, 0.2);
    }
    #status.st-alert {
      border-color: rgba(255, 138, 138, 0.7);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.45),
        0 8px 22px rgba(0, 0, 0, 0.2),
        0 0 18px rgba(255, 70, 80, 0.22);
    }
    #status.st-sleep {
      border-color: rgba(168, 176, 208, 0.5);
    }
    #status.st-wake,
    #status.st-idle {
      border-color: rgba(255, 255, 255, 0.35);
    }
    #status.st-click {
      border-color: rgba(255, 210, 0, 0.75);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        0 8px 22px rgba(0, 0, 0, 0.2),
        0 0 16px rgba(255, 210, 0, 0.25);
    }
    #status.flash {
      transform: translateY(0) scale(1.05);
    }
    @media (prefers-reduced-motion: reduce) {
      #status,
      #statusToggle,
      #statusToggle .chev {
        transition-duration: 0.01ms;
      }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="petArea">
      <canvas id="petCanvas" width="256" height="256"></canvas>
      <button
        type="button"
        id="statusToggle"
        class="status-on"
        aria-label="Hide status bubble"
        title="Hide status"
        aria-pressed="true"
      >
        <span class="chev" aria-hidden="true"></span>
      </button>
    </div>
    <div id="status" class="st-idle" aria-live="polite">
      <div id="statusLabel">boot</div>
      <div id="statusDetail"></div>
    </div>
  </div>
  <script src="./animation-loop.js"></script>
  <script src="./pet.js"></script>
</body>
</html>
