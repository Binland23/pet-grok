<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: file: blob:;" />
  <title>Pet Grok</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    body { display: flex; align-items: center; justify-content: center; }
    #stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
    #petCanvas {
      width: 92%;
      height: 92%;
      image-rendering: auto;
    }
    #status {
      position: absolute;
      left: 50%;
      bottom: 3%;
      transform: translateX(-50%);
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      background: rgba(15, 25, 45, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      padding: 3px 11px;
      pointer-events: none;
      opacity: 0.95;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    #status.st-thinking { background: rgba(40, 90, 180, 0.9); border-color: #7eb6ff; }
    #status.st-working  { background: rgba(180, 100, 20, 0.92); border-color: #ffc14a; }
    #status.st-done     { background: rgba(20, 140, 70, 0.92); border-color: #7dffb0; }
    #status.st-alert    { background: rgba(180, 30, 40, 0.92); border-color: #ff8a8a; }
    #status.st-sleep    { background: rgba(40, 40, 70, 0.85); border-color: #a8b0d0; }
    #status.st-wake,
    #status.st-idle     { background: rgba(15, 25, 45, 0.75); border-color: rgba(255,255,255,0.25); }
    #status.st-click    { background: rgba(180, 140, 20, 0.92); border-color: #ffd200; }
    #status.flash { transform: translateX(-50%) scale(1.06); }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="petCanvas" width="256" height="256"></canvas>
    <div id="status">boot</div>
  </div>
  <script>
    (function () {
      const canvas = document.getElementById('petCanvas');
      const ctx = canvas.getContext('2d');
      const statusEl = document.getElementById('status');
      const api = window.petAPI;
      const ASSET = './assets/race-crab/';

      /**
       * Frame animation profiles. Idle keeps static frames but uses a soft
       * continuous bounce in draw(); sleep stays fully still.
       */
      const MOTION = {
        idle:     { fps: 0, holdMin: 9999, holdMax: 9999, playChance: 0, driftPx: 0, driftSec: 1, static: true },
        thinking: { fps: 2.5, holdMin: 4.0, holdMax: 7.0, playChance: 0.4, driftPx: 0, driftSec: 1, static: false },
        // Vigorous laptop typing — continuous high-fps loop
        working:  { fps: 9, holdMin: 0, holdMax: 0, playChance: 1.0, driftPx: 0, driftSec: 1, static: false, alwaysPlay: true },
        done:     { fps: 6, holdMin: 0.2, holdMax: 0.4, playChance: 1.0, driftPx: 0, driftSec: 1, static: false },
        alert:    { fps: 4, holdMin: 2.0, holdMax: 4.0, playChance: 0.5, driftPx: 0, driftSec: 1, static: false },
        sleep:    { fps: 0, holdMin: 9999, holdMax: 9999, playChance: 0, driftPx: 0, driftSec: 1, static: true },
        wake:     { fps: 5, holdMin: 99, holdMax: 99, playChance: 1.0, driftPx: 0, driftSec: 1, static: false },
        // Local click ack (not driven by Grok hooks)
        click:    { fps: 12, holdMin: 99, holdMax: 99, playChance: 1.0, driftPx: 0, driftSec: 1, static: false },
      };

      const CLICK_MS = 480;
      const DRAG_THRESHOLD_PX = 6;
      /** Idle bounce: slow sine (Hz) and amplitude in canvas px / scale. */
      const IDLE_BOB_HZ = 0.55;
      const IDLE_BOB_PX = 4.5;
      const IDLE_BOB_SCALE = 0.022;

      /** @type {Record<string, {frames: HTMLImageElement[], loop: boolean}>} */
      let anims = {};
      let current = 'idle';
      let frameIndex = 0;
      let frameAcc = 0;
      let lastTs = performance.now();
      let celebrateTimer = null;
      let wakeTimer = null;
      let clickTimer = null;
      let celebrateMs = 1800;
      let wakeMs = 900;
      let dragging = false;
      let dragMoved = false;
      let overPet = false;
      let pointerDown = false;
      let downX = 0;
      let downY = 0;
      let downAt = 0;
      /** State to restore after local click ack (harness states still win via onState). */
      let preClickState = 'idle';
      let clickAnimGen = 0;
      let clickPulse = 0; // 0..1 bounce while acknowledging click
      let muted = false;
      /** @type {AudioContext|null} */
      let audioCtx = null;

      // Hold / occasional play machine
      let mode = 'hold'; // 'hold' | 'play'
      let holdLeft = 2;
      let playOnce = false;

      // ─── Fun SFX (Web Audio synth — no asset files; respects mute) ───
      function ensureAudio() {
        if (!audioCtx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return null;
          audioCtx = new AC();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume().catch(() => {});
        }
        return audioCtx;
      }

      function tone(ctx, {
        type = 'sine',
        freq = 440,
        freqEnd = null,
        start = 0,
        dur = 0.15,
        gain = 0.12,
        attack = 0.01,
        release = 0.08,
      }) {
        const t0 = ctx.currentTime + start;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t0);
        if (freqEnd != null) {
          osc.frequency.exponentialRampToValueAtTime(Math.max(40, freqEnd), t0 + dur);
        }
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(Math.max(0.0001, gain), t0 + attack);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + Math.max(attack + 0.02, dur - release));
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0 + dur + 0.02);
      }

      /** Playful ascending whoop for WEEEE click. */
      function playWeeeSound() {
        if (muted) return;
        const ctx = ensureAudio();
        if (!ctx) return;
        // Main whoop up
        tone(ctx, { type: 'sine', freq: 320, freqEnd: 980, start: 0, dur: 0.22, gain: 0.14, attack: 0.008, release: 0.06 });
        tone(ctx, { type: 'triangle', freq: 480, freqEnd: 1400, start: 0.02, dur: 0.18, gain: 0.06, attack: 0.01, release: 0.05 });
        // Tiny sparkle blips
        tone(ctx, { type: 'sine', freq: 1200, start: 0.12, dur: 0.06, gain: 0.05, attack: 0.005, release: 0.04 });
        tone(ctx, { type: 'sine', freq: 1600, start: 0.18, dur: 0.07, gain: 0.04, attack: 0.005, release: 0.04 });
      }

      /** Cheerful arpeggio when the model finishes (done). */
      function playDoneSound() {
        if (muted) return;
        const ctx = ensureAudio();
        if (!ctx) return;
        // C5 → E5 → G5 → C6 sparkle fanfare
        const notes = [523.25, 659.25, 783.99, 1046.5];
        notes.forEach((f, i) => {
          tone(ctx, {
            type: 'sine',
            freq: f,
            start: i * 0.07,
            dur: 0.18,
            gain: 0.11 - i * 0.012,
            attack: 0.008,
            release: 0.1,
          });
          tone(ctx, {
            type: 'triangle',
            freq: f * 2,
            start: i * 0.07 + 0.01,
            dur: 0.1,
            gain: 0.03,
            attack: 0.005,
            release: 0.06,
          });
        });
        // Soft landing chime
        tone(ctx, { type: 'sine', freq: 784, freqEnd: 523, start: 0.32, dur: 0.28, gain: 0.07, attack: 0.01, release: 0.14 });
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error('load failed: ' + src));
          img.src = src;
        });
      }

      function profile(state) {
        return MOTION[state] || MOTION.idle;
      }

      function scheduleHold(state) {
        const p = profile(state);
        holdLeft = p.holdMin + Math.random() * (p.holdMax - p.holdMin);
        mode = 'hold';
        frameIndex = 0;
        frameAcc = 0;
      }

      async function loadAnimations() {
        let meta = null;
        if (api && api.getAnimations) {
          meta = await api.getAnimations();
        }
        if (!meta) {
          const res = await fetch(ASSET + 'animations.json');
          if (!res.ok) throw new Error('animations.json missing');
          meta = await res.json();
        }
        const out = {};
        for (const [state, def] of Object.entries(meta.animations || {})) {
          const frames = [];
          // Prefer first pose + a couple variants only (skip synthetic bob spam if many frames)
          const list = def.frames || [];
          const pick = list.length <= 4 ? list : [list[0], list[1] || list[0], list[Math.min(2, list.length - 1)], list[0]];
          for (const rel of pick) {
            let src = ASSET + rel;
            if (api && api.assetPath) {
              try { src = await api.assetPath(rel); } catch (_) { src = ASSET + rel; }
            }
            frames.push(await loadImage(src));
          }
          out[state] = {
            frames,
            loop: def.loop !== false,
          };
        }
        if (!out.wake && out.idle) out.wake = { frames: out.idle.frames.slice(), loop: false };
        if (!out.idle && out.thinking) out.idle = out.thinking;
        // Click ack: reuse alert/wake/idle frames if theme has no dedicated click anim
        if (!out.click) {
          const frames = [];
          if (out.alert && out.alert.frames[0]) frames.push(out.alert.frames[0]);
          if (out.alert && out.alert.frames[1]) frames.push(out.alert.frames[1]);
          if (out.wake && out.wake.frames[0]) frames.push(out.wake.frames[0]);
          if (out.idle && out.idle.frames[0]) frames.push(out.idle.frames[0]);
          if (frames.length) out.click = { frames, loop: false };
        }
        return out;
      }

      const STATUS_LABELS = {
        click: 'WEEEE',
      };

      function setStatus(text) {
        const key = String(text || '').toLowerCase();
        statusEl.textContent = STATUS_LABELS[key] || text;
        statusEl.className = 'st-' + key;
        statusEl.classList.add('flash');
        void statusEl.offsetWidth;
        setTimeout(() => statusEl.classList.remove('flash'), 200);
      }

      function setState(next) {
        if (!next) return;
        next = String(next).toLowerCase();

        // Harness / external states cancel a local click ack
        if (next !== 'click') {
          if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
          clickPulse = 0;
        }

        if (celebrateTimer) { clearTimeout(celebrateTimer); celebrateTimer = null; }
        if (wakeTimer) { clearTimeout(wakeTimer); wakeTimer = null; }

        if (next === 'wake') {
          applyState('wake');
          wakeTimer = setTimeout(() => setState('idle'), wakeMs);
          return;
        }
        if (next === 'done') {
          applyState('done');
          // Play celebrate frames once, then settle — no perpetual jumping
          mode = 'play';
          playOnce = true;
          playDoneSound();
          celebrateTimer = setTimeout(() => setState('idle'), celebrateMs);
          return;
        }
        if (next === 'click') {
          playClickAck();
          return;
        }
        applyState(next);
      }

      /**
       * Short local "you clicked me" animation, then restore prior state.
       * Does not go through the Grok state server.
       */
      function playClickAck() {
        if (current !== 'click') {
          preClickState =
            current === 'sleep' || current === 'wake' || current === 'done'
              ? 'idle'
              : current || 'idle';
        }
        const gen = ++clickAnimGen;
        if (clickTimer) clearTimeout(clickTimer);
        clickPulse = 1;
        playWeeeSound();
        applyState('click');
        mode = 'play';
        playOnce = true;
        clickTimer = setTimeout(() => {
          if (gen !== clickAnimGen) return;
          clickTimer = null;
          clickPulse = 0;
          if (current === 'click') {
            applyState(preClickState && preClickState !== 'click' ? preClickState : 'idle');
          }
        }, CLICK_MS);
      }

      function applyState(name) {
        if (!anims[name] && anims.idle) name = 'idle';
        current = name;
        // Always snap to this state's primary frame immediately so harness
        // transitions are visible.
        frameIndex = 0;
        frameAcc = 0;
        const p = profile(name);
        if (p.static) {
          // Fully frozen pose (idle / sleep)
          mode = 'hold';
          holdLeft = 1e9;
          playOnce = false;
        } else if (name === 'wake' || name === 'done' || name === 'click') {
          mode = 'play';
          playOnce = true;
        } else if (p.alwaysPlay) {
          // Continuous loop (working / laptop typing)
          mode = 'play';
          playOnce = false;
        } else {
          scheduleHold(name);
        }
        setStatus(name);
        console.log('[pet] applied state', name, 'frames=', (anims[name] && anims[name].frames.length) || 0);
      }

      function draw(ts) {
        const dt = Math.min(0.05, (ts - lastTs) / 1000);
        lastTs = ts;

        if (clickPulse > 0) {
          clickPulse = Math.max(0, clickPulse - dt * 2.4);
        }

        const anim = anims[current] || anims.idle;
        const p = profile(current);

        if (anim && anim.frames.length) {
          if (!p.static && mode === 'hold') {
            holdLeft -= dt;
            if (holdLeft <= 0) {
              if (p.playChance > 0 && Math.random() < p.playChance && anim.frames.length > 1) {
                mode = 'play';
                frameIndex = 0;
                frameAcc = 0;
                playOnce = true;
              } else {
                scheduleHold(current);
              }
            }
          } else if (!p.static && mode === 'play') {
            // sequence for active states; continuous loop when alwaysPlay
            frameAcc += dt * p.fps;
            while (frameAcc >= 1) {
              frameAcc -= 1;
              frameIndex += 1;
              if (frameIndex >= anim.frames.length) {
                if (p.alwaysPlay || (anim.loop && !playOnce)) {
                  frameIndex = 0;
                  continue;
                }
                frameIndex = anim.frames.length - 1;
                if (current === 'click') {
                  // hold last click frame until click timer restores prior state
                  mode = 'hold';
                  holdLeft = 1e9;
                } else {
                  frameIndex = 0;
                  scheduleHold(current);
                }
                break;
              }
            }
          } else {
            // static: always frame 0
            frameIndex = 0;
          }

          const img = anim.frames[Math.min(frameIndex, anim.frames.length - 1)];
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Click bounce: quick squash/stretch
          const bounce =
            current === 'click' || clickPulse > 0
              ? 1 + 0.12 * Math.sin((1 - clickPulse) * Math.PI) * Math.max(clickPulse, current === 'click' ? 0.35 : 0)
              : 1;

          // Idle: soft continuous bob (subtle breathe / bounce)
          let bobY = 0;
          let idleScale = 1;
          if (current === 'idle' && clickPulse <= 0) {
            const phase = (ts / 1000) * IDLE_BOB_HZ * Math.PI * 2;
            bobY = Math.sin(phase) * IDLE_BOB_PX;
            idleScale = 1 + Math.sin(phase) * IDLE_BOB_SCALE;
          }

          // Ground shadow stays planted; shrinks slightly when pet rises
          const lift = Math.max(0, -bobY); // positive when above rest
          const shadowScale = 1 - lift * 0.025;
          ctx.save();
          ctx.fillStyle = 'rgba(10,20,40,0.16)';
          ctx.beginPath();
          ctx.ellipse(128, 238, 68 * shadowScale, 9 * shadowScale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          // Pet transforms: pivot near feet so bob feels grounded
          const scaleX = bounce * idleScale;
          const scaleY = (2 - bounce) * idleScale;
          ctx.save();
          ctx.translate(128, 200 + bobY);
          ctx.scale(scaleX, scaleY);
          ctx.translate(-128, -200);
          ctx.drawImage(img, 0, 0, 256, 256);
          ctx.restore();
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        requestAnimationFrame(draw);
      }

      function hitTest(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height * 0.55;
        const rx = rect.width * 0.36;
        const ry = rect.height * 0.40;
        const dx = (clientX - cx) / rx;
        const dy = (clientY - cy) / ry;
        return dx * dx + dy * dy <= 1.15;
      }

      function updateIgnore(x, y) {
        if (pointerDown || dragging) return;
        const hit = hitTest(x, y);
        if (hit !== overPet) {
          overPet = hit;
          if (api) api.setIgnoreMouse(!hit);
        }
        if (hit && current === 'sleep') {
          if (api) api.wakeFromIdle();
          else setState('idle');
        }
      }

      function beginPotentialDrag(clientX, clientY) {
        pointerDown = true;
        dragMoved = false;
        dragging = false;
        downX = clientX;
        downY = clientY;
        downAt = performance.now();
        overPet = true;
        if (api) api.setIgnoreMouse(false);
      }

      function onPointerMove(clientX, clientY) {
        if (!pointerDown) return;
        const dx = clientX - downX;
        const dy = clientY - downY;
        if (!dragMoved && dx * dx + dy * dy >= DRAG_THRESHOLD_PX * DRAG_THRESHOLD_PX) {
          dragMoved = true;
          dragging = true;
          if (api) api.dragStart();
        }
        if (dragging && api) api.dragMove();
      }

      function onPointerUp() {
        if (!pointerDown) return;
        const wasDrag = dragMoved;
        pointerDown = false;
        dragging = false;
        if (wasDrag) {
          if (api) api.dragEnd();
          return;
        }
        // True click: bounce + focus Grok terminal tab
        playClickAck();
        if (api && api.focusGrokTerminal) {
          api.focusGrokTerminal().catch((err) => console.warn('[focus]', err));
        }
      }

      window.addEventListener('mousemove', (e) => {
        updateIgnore(e.clientX, e.clientY);
        onPointerMove(e.clientX, e.clientY);
      });
      window.addEventListener('mousedown', (e) => {
        if (!hitTest(e.clientX, e.clientY) || e.button !== 0) return;
        beginPotentialDrag(e.clientX, e.clientY);
        e.preventDefault();
      });
      window.addEventListener('mouseup', () => {
        onPointerUp();
      });
      window.addEventListener('contextmenu', (e) => {
        if (!hitTest(e.clientX, e.clientY)) return;
        e.preventDefault();
        pointerDown = false;
        dragging = false;
        dragMoved = false;
        if (api) { api.setIgnoreMouse(false); api.showContextMenu(); }
      });
      document.addEventListener('mouseleave', () => {
        if (!pointerDown && !dragging && api) { overPet = false; api.setIgnoreMouse(true); }
      });

      async function init() {
        try {
          anims = await loadAnimations();
          setState('idle');
        } catch (err) {
          console.error(err);
          setStatus('asset error');
        }
        requestAnimationFrame(draw);

        if (!api) return;

        try {
          const theme = await api.getTheme();
          if (theme?.celebrateMs) celebrateMs = Math.min(theme.celebrateMs, 2000);
          if (theme?.wakeMs) wakeMs = theme.wakeMs;
        } catch (_) { /* ignore */ }

        try {
          const prefs = await api.getPrefs();
          if (prefs && typeof prefs.mute === 'boolean') muted = prefs.mute;
        } catch (_) { /* ignore */ }

        api.onState((s) => setState(s));
        api.setIgnoreMouse(true);

        if (api.onThemeChanged) {
          api.onThemeChanged(async (theme) => {
            try {
              if (theme?.celebrateMs) celebrateMs = Math.min(theme.celebrateMs, 2000);
              if (theme?.wakeMs) wakeMs = theme.wakeMs;
              anims = await loadAnimations();
              setState(current || 'idle');
            } catch (err) {
              console.error('[theme reload]', err);
            }
          });
        }
        if (api.onPrefs) {
          api.onPrefs((p) => {
            if (p && typeof p.mute === 'boolean') muted = p.mute;
          });
        }
      }

      init();
    })();
  </script>
</body>
</html>
