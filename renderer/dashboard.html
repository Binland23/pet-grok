<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: file: blob:;" />
  <title>Pet Grok — Dashboard</title>
  <style>
    :root {
      --bg: #0b1220;
      --bg-elevated: #121c2e;
      --surface: #162235;
      --surface-2: #1c2b42;
      --border: rgba(168, 192, 216, 0.14);
      --border-strong: rgba(255, 210, 0, 0.35);
      --text: #e8eef6;
      --text-muted: #8fa3bb;
      --accent: #e10600;
      --accent-soft: rgba(225, 6, 0, 0.16);
      --gold: #ffd200;
      --ok: #3dd68c;
      --warn: #f0b429;
      --radius: 14px;
      --font: "Segoe UI", "SF Pro Text", system-ui, sans-serif;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(900px 420px at 100% -10%, rgba(225, 6, 0, 0.12), transparent 55%),
        radial-gradient(700px 360px at -10% 110%, rgba(255, 210, 0, 0.06), transparent 50%),
        var(--bg);
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      user-select: none;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .brand h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .brand .tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(255, 210, 0, 0.1);
      border: 1px solid rgba(255, 210, 0, 0.28);
      border-radius: 999px;
      padding: 2px 8px;
    }
    .title-actions {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    .icon-btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .icon-btn:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.22);
      background: var(--surface-2);
    }

    main {
      flex: 1;
      overflow: auto;
      padding: 18px 20px 24px;
      display: grid;
      gap: 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 16px;
    }
    @media (max-width: 720px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    .card {
      background: linear-gradient(180deg, var(--bg-elevated), var(--surface));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .card h2 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      color: var(--text);
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .pill.ok .dot { background: var(--ok); box-shadow: 0 0 0 3px rgba(61, 214, 140, 0.15); }
    .pill.warn .dot { background: var(--warn); }
    .pill.bad .dot { background: var(--accent); }
    .pill .mono { font-family: var(--mono); font-weight: 500; color: var(--text-muted); }

    .pets {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .pet-card {
      position: relative;
      border: 1px solid var(--border);
      background: var(--surface-2);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      color: inherit;
      font: inherit;
      transition: border-color 0.15s ease, transform 0.15s ease, background 0.15s ease;
    }
    .pet-card:hover {
      border-color: rgba(255,255,255,0.22);
      transform: translateY(-1px);
    }
    .pet-card.selected {
      border-color: var(--border-strong);
      background: linear-gradient(180deg, rgba(255, 210, 0, 0.08), var(--surface-2));
      box-shadow: inset 0 0 0 1px rgba(255, 210, 0, 0.12);
    }
    .pet-card .thumb {
      width: 72px;
      height: 72px;
      margin: 0 auto 10px;
      border-radius: 12px;
      background: #0a101c;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .pet-card .thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: auto;
    }
    .pet-card .name {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: -0.01em;
    }
    .pet-card .desc {
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .pet-card .badge {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }
    .field:last-child { margin-bottom: 0; }
    .field label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .seg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      background: rgba(0,0,0,0.22);
      padding: 4px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .seg button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-muted);
      font: inherit;
      font-weight: 600;
      font-size: 12px;
      padding: 8px 6px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .seg button:hover { color: var(--text); }
    .seg button.active {
      background: var(--surface-2);
      color: var(--text);
      box-shadow: 0 1px 0 rgba(0,0,0,0.35);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid var(--border);
    }
    .toggle-row:first-of-type { border-top: 0; padding-top: 0; }
    .toggle-row .meta .title { font-weight: 600; font-size: 13px; }
    .toggle-row .meta .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .switch {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch span {
      position: absolute;
      inset: 0;
      background: #2a3a52;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .switch span::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.15s ease;
    }
    .switch input:checked + span { background: var(--accent); }
    .switch input:checked + span::after { transform: translateX(18px); }
    .switch input:focus-visible + span { outline: 2px solid var(--gold); outline-offset: 2px; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font: inherit;
      font-weight: 600;
      font-size: 12px;
      padding: 9px 12px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    }
    .btn:hover { border-color: rgba(255,255,255,0.22); }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
    }
    .btn.primary:hover { filter: brightness(1.08); }
    .btn.ghost { background: transparent; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .footer {
      padding: 10px 20px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-muted);
      font-size: 11px;
    }
    .toast {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #0f1a2c;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 20;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <header class="titlebar">
    <div class="brand">
      <h1>Pet Grok</h1>
      <span class="tag">Dashboard</span>
    </div>
    <div class="title-actions">
      <button type="button" class="icon-btn" id="btnRefresh" title="Refresh">↻</button>
      <button type="button" class="icon-btn" id="btnClose" title="Close">✕</button>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>Live status</h2>
      <div class="status-row" id="statusRow">
        <span class="pill warn"><span class="dot"></span> Loading…</span>
      </div>
    </section>

    <div class="grid-2">
      <section class="card">
        <h2>Pet</h2>
        <div class="pets" id="pets"></div>
        <p class="hint">Click a pet to switch. Drop more into <span class="mono">themes/&lt;id&gt;/</span> and they’ll show up here automatically.</p>
      </section>

      <section class="card">
        <h2>Settings</h2>

        <div class="field">
          <label>Size</label>
          <div class="seg" id="sizeSeg" role="group" aria-label="Pet size">
            <button type="button" data-size="S">Small</button>
            <button type="button" data-size="M">Medium</button>
            <button type="button" data-size="L">Large</button>
          </div>
        </div>

        <div class="toggle-row">
          <div class="meta">
            <div class="title">Show pet</div>
            <div class="sub">Desktop overlay visibility</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggleVisible" />
            <span></span>
          </label>
        </div>

        <div class="toggle-row">
          <div class="meta">
            <div class="title">Mute sounds</div>
            <div class="sub">Click WEEEE + done celebration SFX</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggleMute" />
            <span></span>
          </label>
        </div>

        <div class="toggle-row">
          <div class="meta">
            <div class="title">Grok hooks</div>
            <div class="sub" id="hooksSub">Not installed</div>
          </div>
          <button type="button" class="btn" id="btnHooks">Install</button>
        </div>
      </section>
    </div>

    <section class="card">
      <h2>Quick actions</h2>
      <div class="actions">
        <button type="button" class="btn primary" id="btnShowPet">Show pet</button>
        <button type="button" class="btn" id="btnRefreshHooks">Refresh hooks</button>
        <button type="button" class="btn ghost" id="btnHealth">Check health</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span id="footerLeft">Pet Grok</span>
    <span id="footerRight">v1</span>
  </footer>
  <div class="toast" id="toast" role="status"></div>

  <script>
    (function () {
      const api = window.dashboardAPI;
      if (!api) {
        document.getElementById('statusRow').innerHTML =
          '<span class="pill bad"><span class="dot"></span> Dashboard API unavailable</span>';
        return;
      }

      /** @type {any} */
      let snap = null;

      function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toast._t);
        toast._t = setTimeout(() => el.classList.remove('show'), 1800);
      }

      function pathToFileUrl(abs) {
        if (!abs) return '';
        // main already may send file URL; if path, encode lightly
        if (String(abs).startsWith('file:')) return abs;
        return 'file://' + String(abs).replace(/\\/g, '/');
      }

      function renderStatus() {
        const row = document.getElementById('statusRow');
        if (!snap) return;
        const serverOk = !!snap.serverOk;
        const last = snap.lastState || '—';
        const hooksOk = !!snap.hooksInstalled;
        const visible = snap.visible !== false;
        row.innerHTML = [
          `<span class="pill ${serverOk ? 'ok' : 'bad'}"><span class="dot"></span> Server ${serverOk ? 'online' : 'offline'}</span>`,
          `<span class="pill"><span class="dot"></span> State <span class="mono">${escapeHtml(last)}</span></span>`,
          `<span class="pill ${hooksOk ? 'ok' : 'warn'}"><span class="dot"></span> Hooks ${hooksOk ? 'installed' : 'missing'}</span>`,
          `<span class="pill ${visible ? 'ok' : 'warn'}"><span class="dot"></span> Pet ${visible ? 'shown' : 'hidden'}</span>`,
        ].join('');
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function renderPets() {
        const root = document.getElementById('pets');
        const themes = (snap && snap.themes) || [];
        const current = (snap && snap.themeId) || 'race-crab';
        if (!themes.length) {
          root.innerHTML = '<p class="hint">No themes found under themes/.</p>';
          return;
        }
        root.innerHTML = themes
          .map((t) => {
            const selected = t.id === current ? 'selected' : '';
            const badge = t.id === current ? '<span class="badge">Active</span>' : '';
            const img = t.previewUrl
              ? `<img src="${escapeHtml(t.previewUrl)}" alt="" />`
              : '<span style="color:#8fa3bb;font-size:11px">No preview</span>';
            return `
              <button type="button" class="pet-card ${selected}" data-theme="${escapeHtml(t.id)}">
                ${badge}
                <div class="thumb">${img}</div>
                <div class="name">${escapeHtml(t.name)}</div>
                <div class="desc">${escapeHtml(t.description || t.id)}</div>
              </button>`;
          })
          .join('');

        root.querySelectorAll('[data-theme]').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-theme');
            try {
              snap = await api.setTheme(id);
              renderAll();
              toast('Pet updated');
            } catch (e) {
              toast('Could not switch pet');
            }
          });
        });
      }

      function renderSettings() {
        if (!snap) return;
        document.querySelectorAll('#sizeSeg [data-size]').forEach((btn) => {
          btn.classList.toggle('active', btn.getAttribute('data-size') === snap.size);
        });
        document.getElementById('toggleVisible').checked = snap.visible !== false;
        document.getElementById('toggleMute').checked = !!snap.mute;
        document.getElementById('hooksSub').textContent = snap.hooksInstalled
          ? (snap.hooksPath || 'Installed')
          : 'Not installed — Grok TUI won’t drive the pet';
        const btn = document.getElementById('btnHooks');
        btn.textContent = snap.hooksInstalled ? 'Uninstall' : 'Install';
        document.getElementById('footerLeft').textContent =
          (snap.themeName || 'Pet Grok') + ' · port 7788';
        document.getElementById('footerRight').textContent = snap.version || 'v1';
      }

      function renderAll() {
        renderStatus();
        renderPets();
        renderSettings();
      }

      async function refresh() {
        snap = await api.getSnapshot();
        renderAll();
      }

      async function patch(p, msg) {
        snap = await api.applySettings(p);
        renderAll();
        if (msg) toast(msg);
      }

      document.getElementById('btnClose').addEventListener('click', () => api.close());
      document.getElementById('btnRefresh').addEventListener('click', async () => {
        await refresh();
        toast('Refreshed');
      });

      document.querySelectorAll('#sizeSeg [data-size]').forEach((btn) => {
        btn.addEventListener('click', () => patch({ size: btn.getAttribute('data-size') }, 'Size updated'));
      });

      document.getElementById('toggleVisible').addEventListener('change', (e) => {
        patch({ visible: e.target.checked }, e.target.checked ? 'Pet shown' : 'Pet hidden');
      });
      document.getElementById('toggleMute').addEventListener('change', (e) => {
        patch({ mute: e.target.checked }, e.target.checked ? 'Muted' : 'Unmuted');
      });

      document.getElementById('btnHooks').addEventListener('click', async () => {
        if (snap && snap.hooksInstalled) {
          snap = await api.uninstallHooks();
          toast('Hooks removed');
        } else {
          snap = await api.installHooks();
          toast('Hooks installed');
        }
        renderAll();
      });

      document.getElementById('btnRefreshHooks').addEventListener('click', async () => {
        snap = await api.installHooks();
        renderAll();
        toast('Hooks refreshed');
      });

      document.getElementById('btnShowPet').addEventListener('click', () => {
        patch({ visible: true }, 'Pet shown');
      });

      document.getElementById('btnHealth').addEventListener('click', async () => {
        const h = await api.openHealth();
        if (h && h.ok) toast('Server ok · ' + (h.lastState || '?'));
        else toast('Server offline');
        await refresh();
      });

      api.onSnapshot((s) => {
        snap = s;
        renderAll();
      });

      refresh().catch((err) => {
        document.getElementById('statusRow').innerHTML =
          '<span class="pill bad"><span class="dot"></span> ' + escapeHtml(err.message || 'Load failed') + '</span>';
      });
    })();
  </script>
</body>
</html>
